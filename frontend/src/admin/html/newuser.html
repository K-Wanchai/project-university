<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ข้อมูลผู้ใช้งาน - ครูปุ๊ก ติวเตอร์</title>
    <link rel="stylesheet" href="../css/newuser.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <nav class="sidebar">
            <div class="logo-section">
                <div class="logo-icon"><i class="fas fa-brain"></i></div>
                <h2>ครูปุ๊ก ติวเตอร์</h2>
            </div>
            <ul class="nav-menu">
                <li><a href="standard.html"><i class="fas fa-home"></i> หน้าหลัก</a></li>
                <li class="menu-header">การจัดการผู้ใช้</li>
                <li class="active"><a href="#"><i class="fas fa-users"></i> ข้อมูลผู้ใช้งาน</a></li>
                <li class="menu-header">การจัดการสถาบัน</li>
                <li><a href="#"><i class="fas fa-school"></i> ข้อมูลโรงเรียนกวดวิชา</a></li>
                <li><a href="#"><i class="fas fa-map-marker-alt"></i> ข้อมูลสถาบันที่จัดสอบ</a></li>
                <li class="menu-header">การจัดการเนื้อหา</li>
                <li><a href="#"><i class="fas fa-book"></i> ข้อมูลคอร์สเรียน</a></li>
                <li class="bottom-menu"><a href="#"><i class="fas fa-key"></i> เปลี่ยนรหัสผ่าน</a></li>
            </ul>
        </nav>

        <main class="main-content">
            <header class="content-header">
                <div>
                    <a href="user.html" class="btn-back"><i class="fas fa-arrow-left"></i> ย้อนกลับ</a>
                    <h1 id="pageTitle" style="margin-top: 15px;">เพิ่มผู้ใช้งานใหม่</h1>
                </div>
            </header>

            <section class="form-card">
                <form id="userForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>ชื่อ (First Name) *</label>
                            <input type="text" id="firstName" required placeholder="กรอกชื่อจริง">
                        </div>
                        <div class="form-group">
                            <label>นามสกุล (Last Name) *</label>
                            <input type="text" id="lastName" required placeholder="กรอกนามสกุล">
                        </div>
                        <div class="form-group">
                            <label>ชื่อผู้ใช้ (Username) *</label>
                            <input type="text" id="username" required placeholder="สำหรับใช้ Login">
                        </div>
                        <div class="form-group">
                            <label>อีเมล (Email) *</label>
                            <input type="email" id="email" required placeholder="example@mail.com">
                        </div>
                        <div class="form-group">
                            <label>บทบาท (Role)</label>
                            <select id="role">
                                <option value="นักเรียน">นักเรียน</option>
                                <option value="ผู้ดูแลระบบ">ผู้ดูแลระบบ</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>สถานะการใช้งาน</label>
                            <select id="status">
                                <option value="ปกติ">ปกติ (Active)</option>
                                <option value="ปิดใช้งาน">ปิดใช้งาน (Inactive)</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn-secondary" onclick="window.location.href='newuser.html'">ยกเลิก</button>
                        <button type="submit" class="btn-primary">บันทึกข้อมูลผู้ใช้งาน</button>
                    </div>
                </form>
            </section>
        </main>
    </div>
    <script src="../js/newuser.js"></script>
</body>
</html>
