<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สมัครสมาชิก</title>

  <link rel="stylesheet" href="../css/register.css">
</head>
<body>

<div class="container">

  <div class="sidebar">
    <h1>ครูปุ๊ก<br>ติวเตอร์</h1>
  </div>

  <div class="content">
    <h1>สมัครสมาชิกใหม่</h1>

    <div class="card">
      <h3>1. ข้อมูลส่วนตัว</h3>

      <div class="row">
        <input type="text" id="firstName" placeholder="ชื่อ">
        <input type="text" id="lastName" placeholder="นามสกุล">
        <input type="text" id="nationalId" placeholder="เลขบัตรประชาชน">
      </div>

      <div class="row">
        <input type="date" id="dateOfBirth">
        
        <div class="radio-group">
          เพศ:
          <label><input type="radio" name="gender" value="ชาย"> ชาย</label>
          <label><input type="radio" name="gender" value="หญิง"> หญิง</label>
        </div>
        
        <div class="radio-group" style="display:none;">
          สถานะ:
          <label><input type="radio" name="role" value="นักเรียน" checked> นักเรียน</label>
          <label><input type="radio" name="role" value="คุณครู"> คุณครู</label>
        </div>

        <select id="gradeLevel">
          <option value="">เลือกระดับชั้น</option>
          <option value="มัธยมศึกษาตอนต้น">มัธยมศึกษาตอนต้น</option>
          <option value="มัธยมศึกษาตอนปลาย">มัธยมศึกษาตอนปลาย</option>
          <option value="ระดับอุดมศึกษา">ระดับอุดมศึกษา</option>
        </select>
      </div>
    </div>

    <div class="card">
      <h3>2. ข้อมูลการติดต่อ</h3>

      <div class="row">
        <input type="text" id="phoneNumber" placeholder="เบอร์โทรศัพท์">
        <input type="email" id="email" placeholder="อีเมล">
        <input type="text" id="address" placeholder="ที่อยู่">
      </div>
    </div>

    <div class="card">
      <h3>3. ข้อมูลบัญชีผู้ใช้</h3>

      <div class="row">
        <input type="text" id="username" placeholder="ชื่อผู้ใช้">
        <input type="password" id="password" placeholder="รหัสผ่าน">
        <input type="password" id="confirmPassword" placeholder="ยืนยันรหัสผ่าน">
      </div>
    </div>

    <div class="footer">
      <label>
        <input type="checkbox" id="accept" required>
        ฉันยอมรับเงื่อนไขการใช้งานและนโยบายความเป็นส่วนตัว
      </label>

      <button id="submitBtn">สมัครสมาชิก</button>
      <p>มีบัญชีแล้ว? <a href="login.html">เข้าสู่ระบบ</a></p>
    </div>

  </div>
</div>

<script src="../js/register.js"></script>
</body>
</html>
